<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BookQuest Advertisements</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: Inter, sans-serif;
  background: #020617;
  color: white;
}

header {
  padding: 30px;
  text-align: center;
}

h1 {
  font-size: 2.5rem;
  background: linear-gradient(135deg,#7c3aed,#06b6d4,#f97316);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.container {
  max-width: 1100px;
  margin: auto;
  padding: 20px;
}

.banner {
  margin: 25px 0;
  border-radius: 25px;
  overflow: hidden;
  position: relative;
  height: 340px;
  display: flex;
  align-items: center;
  background: #111827;
  border: 1px solid rgba(255,255,255,0.1);
}

.banner img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  opacity: 0.35;
  position: absolute;
}

.banner-content {
  position: relative;
  padding: 30px;
  z-index: 2;
}

.title {
  font-size: 2rem;
  font-weight: 700;
}

.price {
  color: #fbbf24;
  margin-top: 10px;
  font-weight: 700;
}

.desc {
  margin-top: 10px;
  color: #cbd5e1;
  max-width: 500px;
  line-height: 1.6;
}

.btn {
  margin-top: 15px;
  display: inline-block;
  padding: 10px 18px;
  border-radius: 10px;
  background: linear-gradient(135deg,#7c3aed,#06b6d4,#f97316);
  color: white;
  text-decoration: none;
  font-weight: 600;
}
</style>
</head>

<body>

<header>
  <h1>Sponsored Book Advertisements</h1>
</header>

<div class="container" id="ads"></div>

<script>

/* =========================
   DEMO ADS (FALLBACK DATA)
   - Used if admin hasn't posted anything yet
========================= */

const DEMO_ADS = [
  {
    title: "The Purpose Driven Life",
    price: "$5",
    desc: "Discover God's purpose for your life through this powerful spiritual guide.",
    image: "https://images.unsplash.com/photo-1524995997946-a1c2e315a42f"
  },
  {
    title: "Atomic Habits",
    price: "$8",
    desc: "Build good habits and break bad ones with proven behavioral science.",
    image: "https://images.unsplash.com/photo-1519681393784-d120267933ba"
  },
  {
    title: "Bible Study Mastery Pack",
    price: "$3",
    desc: "Deep structured Bible learning system for spiritual growth.",
    image: "https://images.unsplash.com/photo-1491841550275-ad7854e35ca6"
  }
];


/* =========================
   GET ADS (ADMIN CONNECTED)
   - Admin must store SAME STRUCTURE
========================= */

function getAds(){
  return JSON.parse(localStorage.getItem("bookquest_ads") || "null");
}


/* =========================
   RENDER ADS
========================= */

function render(){
  const ads = getAds() || DEMO_ADS;

  document.getElementById("ads").innerHTML = ads.map(ad => `
    <div class="banner">
      <img src="${ad.image}" alt="ad image"/>

      <div class="banner-content">
        <div class="title">${ad.title}</div>
        <div class="price">${ad.price}</div>
        <div class="desc">${ad.desc}</div>

        <a class="btn" href="https://book-quest-3qzv7i2gn-praise-god-s-projects.vercel.app/">
          Buy Now
        </a>
      </div>
    </div>
  `).join("");
}

render();

</script>

</body>
</html>
